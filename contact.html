<!DOCTYPE html>
<html>
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Contact</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="stylesheet" href="style.css">
        
    </head>

    <body>
  <header class="topbar">
        <div class="container d-flex align-items-center justify-content-between py-3">
      <div class="brand">
      <div class="hero-left">
                <img src="images/Logo.png" alt="IDraTab logo" class="logo-img">
                </div>
      </div>
         <nav class="menu">
            <a href="index.html" class="nav-btn">Home</a>
            <a href="features.html" class="nav-btn">Features</a>
            <a href="contact.html" class="nav-btn">Contact</a>
        </nav>
    </div>
  </header>

<main class="contact-page">
    <div class="contact-box">
        <form class="contact-form">
            
 <h2>Product Options</h2>

            <div class="form-row">
                <div class="form-group">
                    <label for="version">Table Version</label>
                    <select id="version" name="version">
                        <option>Basic</option>
                        <option>Pro</option>
                        <option>Premium</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="usecase">Color</label>
                    <select id="usecase" name="usecase">
                        <option>Black</option>
                        <option>White</option>
                    </select>
                </div>
            </div>

            <label>Delivery Type</label>
<select>
    <option>Standard</option>
    <option>Express</option>
</select>

            <div class="form-row">
                <div class="form-group small-box">
                    <label for="price">Price</label>
                    <input type="text" id="price" name="price" placeholder="€15,000">
                </div>

                <div class="form-group">
                    
                </div>
            </div>
            <h2>Personal Info</h2>

            <label for="fullname">Full name</label>
            <input type="text" id="fullname" name="fullname">

            <label for="email">Email</label>
            <input type="email" id="email" name="email">

            <label for="number">Number</label>
            <input type="text" id="number" name="number">

            <label for="country">Country</label>
            <input type="text" id="country" name="country">

            <label for="address">Address</label>
            <input type="address" id="address" name="address">

            <label>Street Address</label>
            <input type="text">

            <label>City</label>
            <input type="text">

            <label>Postcode</label>
            <input type="text">

            

           

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>

            <button type="submit" class="submit-btn">Send Request</button>

         </form>
        </div>
      </main>
  </body>
</html>
